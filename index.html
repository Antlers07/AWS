<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pet Shop</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #ffd6d6, #ffe8cc);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 40px;
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff4d4d;
            transform: scale(1.05);
        }

        .pets {
            margin-top: 20px;
            font-size: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐾 Welcome to My Pet Shop 🐾</h1>
        <p>Your one-stop place for cute and lovely pets!</p>
        <button class="btn">Explore Now</button>
        <div class="pets">🐶 🐱 🐰 🐾</div>
    </div>

</body>
</html>
